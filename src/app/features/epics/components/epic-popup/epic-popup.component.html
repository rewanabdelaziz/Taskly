@if (isOpenPopUpInput() && selectedEpic()) {
    <!-- popup overlay  -->
  <div class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 flex items-center justify-center">
    <!-- popup container -->
    <div class=" bg-white rounded-lg shadow-lg transform transition-all duration-300 scale-100 z-50 max-h-[90vh] overflow-y-auto">
        <!-- header -->
         <div class="pb-2 sm:pb-8 border-b border-border-secodary  px-6 py-2 sm:p-8 bg-gradient-gray sm:bg-gradient-none">
            <div class="flex justify-between mb-3 sm:mb-4 ">
                <div class="flex items-center justify-between gap-1">
                    <app-icon name="epic" [size]="20" class="text-primary hidden sm:inline"></app-icon>
                    <span class="popup-label">{{ selectedEpic()?.epic_id }}</span>
                </div>
                <app-icon name="exit" [size]="14" class="text-third-heading cursor-pointer" (click)="closePopUp()" (keydown.enter)="closePopUp()" tabindex="0"></app-icon>
            </div>
                <app-form-field id="title"
                    inputCustomClass="!popup-title p-2 sm:p-3 border sm:border-surface-highest rounded-xl border-slate-light/80 bg-white"
                    [control]="titleControl"
                    type="text"
                    name="title"
                    placeholder="epic title"
                    [isRequired]="true"
                    [withLettersCount]="false"
                ></app-form-field>
        </div>
        <!-- body -->
        <div class=" px-6 py-2 sm:p-8">
            
            <span class="sm:hidden label-sm mb-2">description</span>
            <app-form-field
              inputCustomClass="resize-none popup-description p-2 sm:p-3 border sm:border-surface-highest rounded-xl border-slate-light/80 min-h-37.5 bg-white"
              id="description"
              name="description"
              type="textarea"
              [control]="descriptionControl"
              placeholder="No description provided"
            ></app-form-field>

            <div class="grid grid-col-2 sm:grid-cols-3 gap-6 mb-6">
                <div class="flex flex-col gap-2">
                    <span class="popup-form-label">created by</span>
                    <div class="flex items-center gap-2 h-10">
                        <app-name-avatar-icon [userName]="selectedEpic()?.created_by!.name" [size]="28" customClass="rounded-[12px] py-[6px]"></app-name-avatar-icon>
                        <span class="popup-body">{{selectedEpic()?.created_by!.name}}</span>
                    </div>
                </div>
    
                <div class="flex flex-col gap-2">
                    <label for="assignee" class="popup-form-label">ASSIGNEE</label>
                    <div class="relative h-10">
                        <select id="assignee" class="w-full h-full px-3 py-2 rounded-lg bg-transparent popup-body border border-surface-highest" formControlName="assignee_id">
                          <option [value]="selectedEpic()?.assignee!.sub" class="flex items-center">
                            <app-name-avatar-icon [userName]="selectedEpic()?.assignee!.name" [size]="28"></app-name-avatar-icon>
                            {{selectedEpic()?.assignee!.name}}</option>
                          @for(member of _sharedMembers.members() ; track member.member_id){
                              <option [value]="member.user_id" class="flex items-center">
                                <app-name-avatar-icon [userName]="member.metadata.name" [size]="28"></app-name-avatar-icon>
                                {{member.metadata.name}}
                              </option>
                          }
                        </select>
                    </div>
                    
                </div>
    
                <div class="flex flex-col gap-2 max-h-10">
                    <app-form-field id="deadline"
                      [control]="deadlineControl"
                      type="date"
                      name="deadline"
                      label="deadline"
                      [minDate]="minDate"
                      [withLettersCount]="false"
                      customLabelClass="popup-form-label mb-2"
                      inputCustomClass="bg-transparent border border-surface-highest"
                    ></app-form-field>
                </div>
                
                <div class="flex flex-col mb-8">
                    <span class="popup-form-label mb-2">created by</span>
                    <div class="flex items-center gap-1.5 h-10">
                       <app-icon name="date" [size]="15" class="me-1"></app-icon>
                       <span class="text-text-body font-medium text-sm/[1.25rem] tracking-normal">
                         {{ selectedEpic()?.created_at | date: 'd MMMM yyyy' }}
                       </span>
                    </div>
                </div>
            </div>
            

            <!-- tasks -->
            <div>
                <div class="flex justify-between mb-6">
                    <span class="uppercase font-bold text-[clamp(0.6875rem,0.7rem+1.25vw,1.125rem)] text-slate-medium sm:text-slate-dark">Tasks</span>
                    <span class="capitalize flex items-center gap-1 text-primary">
                        <app-icon name="plus" [size]="10" ></app-icon>
                        add task
                    </span>
                </div>
                <div>
                    <!-- if empty -->
                     <div class="p-12 bg-[#F1F3FF] flex  items-center justify-center flex-col border border-dashed border-primary/20 rounded-lg">
                        <app-icon name="list" [size]="20" class="text-slate-dark p-4 rounded-xl bg-surface-highest flex-initial"></app-icon>
                        <p class="text-[16px] text-slate-dar my-4">No tasks have been added to this epic yet</p>
                        <button
                          class="btn-primary sm:py-3 flex items-center gap-1 font-medium shadow btn-shadow whitespace-nowrap "
                          [routerLink]="['/project',currentProject()?.id,'tasks']"
                        >
                          <app-icon name="plus" [size]="10" class="me-1"></app-icon> add task
                        </button>
                     </div>
                
                </div>
            </div>

        </div>
         


      
      
      
      
      
    </div>

  </div>
}
