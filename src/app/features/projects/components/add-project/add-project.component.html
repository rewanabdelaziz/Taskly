<div class="flex flex-col items-center h-full">
  <!-- header -->
  <div class="hidden sm:flex sm:flex-col w-full">
    <app-breadcrumb></app-breadcrumb>
    <div class="mt-3 mb-10 flex justify-between">
      <h2 class="title-md">
        {{ isEditMode() ? 'Edit Project' : 'Add New Project' }}
      </h2>
    </div>
  </div>

  <!-- form container -->
  <div class="bg-white shadow shadow-add-project-form-box-shadow rounded-lg max-w-2xl">
    <!-- form header -->
    <div class="px-8 pt-8 flex gap-4 items-center border-b border-surface-low pb-10">
      <div class="hidden sm:inline w-11.5 h-11 rounded-sm p-3 bg-add-task-icon-bg text-primary-container">
        <app-icon name="checked-with-plus" [size]="20"></app-icon>
      </div>
      <div>
        <h2 class="text-[24px]/[32px] font-semibold text-slate-dark sm:tracking-[-0.75px] tracking-normal">
          {{ isEditMode() ? 'Edit Project' : 'Initialize New Project' }}
        </h2>
        <p class="body-sm">Define the scope and foundational details of your project.</p>
      </div>
    </div>
    <!-- form -->
    <form
      class="flex-1 flex flex-col justify-center p-8 sm:px-6"
      [formGroup]="addProjectForm"
      (ngSubmit)="onSubmit($event)"
    >
      <app-form-field 
            id="name"
            [control]="titleControl"
            type="text"
            name="name"
            [isRequired]="true"
            label="Project title"
            placeholder="project title"
        ></app-form-field>

     
      <app-form-field id="description"
            [control]="descriptionControl"
            type="textarea"
            name="description"
            label="description"
            placeholder="Provide a high-level overview of the project's architectural objectives and key milestones..."
            [maxlength]="500"
        ></app-form-field>
        
     

      <div class="flex sm:flex-row justify-between items-center mb-12 flex-col">
        <button
          type="button"
          class="btn-ghost sm:text-slate-medium text-primary w-full sm:w-auto shadow-none"
          (click)="navigateToProjectList()"
        >
          Back
        </button>
        <button type="submit" class="btn-primary w-full sm:w-auto sm:px-8 rounded-lg sm:rounded-none">
          {{ isEditMode() ? 'save changes' : 'create project' }}
        </button>
      </div>
    </form>
    <div
      class="bg-surface-low w-full text-slate-medium text-[12px]/[100%] tracking-normal font-medium flex p-6 items-center gap-1.5"
    >
      <app-icon name="light" class="hidden! sm:inline-flex!"></app-icon>

      <p>
        <span class="font-bold">Pro Tip:</span> You can invite project members and assign epics immediately after the
        initial creation process.
      </p>
    </div>
  </div>
</div>
