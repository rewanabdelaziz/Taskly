<nav class="uppercase font-bold text-[12px]/[16px] tracking-[1.2px] no-underline flex items-center">
  @for (crumbs of breadcrumbs(); track i; let i = $index; let last = $last) {
    <a
      class="text-ghost-link hover:text-primary"
      [routerLink]="crumbs.url"
      [routerLinkActive]="crumbs.withRouterLinkActive? 'text-primary' : '' "
      [routerLinkActiveOptions]="{ exact: true }"
      >{{ crumbs.label }}</a
    >
    @if (!last) {
      <app-icon name="next-arrow" [size]="8" class="m-2 text-ghost-link text-[8px]!"></app-icon>
    }
  }
</nav>
